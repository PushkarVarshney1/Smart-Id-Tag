<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Smart ID Tag</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <nav>
    <div class="nav-container">
      <a href="/" class="logo">
        <span>🏷️</span>
        Smart ID Tag
      </a>
      <div class="nav-links">
        <a href="/login">Login</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="form-container">
      <h2>Create Your Account</h2>
      
      <div id="alertBox"></div>

      <form id="registerForm">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" required>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" minlength="6" required>
          <small style="color: var(--text-light);">Minimum 6 characters</small>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" required>
        </div>

        <button type="submit" class="btn btn-block" id="submitBtn">
          Create Account
        </button>
      </form>

      <p style="text-align: center; margin-top: 20px; color: var(--text-light);">
        Already have an account? <a href="/login" style="color: var(--primary-color);">Login here</a>
      </p>
    </div>
  </div>

  <script>
    // Check if already logged in
    async function checkIfLoggedIn() {
      try {
        const response = await fetch('/api/check-auth');
        const data = await response.json();
        
        if (data.authenticated) {
          // Already logged in, redirect to dashboard
          window.location.href = '/dashboard';
        }
      } catch (error) {
        // Not logged in, stay on register page
      }
    }

    checkIfLoggedIn();

    const form = document.getElementById('registerForm');
    const alertBox = document.getElementById('alertBox');
    const submitBtn = document.getElementById('submitBtn');

    function showAlert(message, type = 'error') {
      alertBox.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
      setTimeout(() => {
        alertBox.innerHTML = '';
      }, 5000);
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      // Validation
      if (password !== confirmPassword) {
        showAlert('Passwords do not match');
        return;
      }

      if (password.length < 6) {
        showAlert('Password must be at least 6 characters');
        return;
      }

      // Disable button
      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating Account...';

      try {
        const response = await fetch('/api/register', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ name, email, password })
        });

        const data = await response.json();

        if (response.ok) {
          showAlert('Account created successfully! Redirecting...', 'success');
          setTimeout(() => {
            window.location.href = '/dashboard';
          }, 1500);
        } else {
          showAlert(data.error || 'Registration failed');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Create Account';
        }
      } catch (error) {
        showAlert('Network error. Please try again.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
